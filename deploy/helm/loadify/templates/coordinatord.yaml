apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "loadify.fullname" . }}-coordinatord
  labels:
    {{- include "loadify.labels" . | nindent 4 }}
    app.kubernetes.io/component: coordinatord
spec:
  replicas: {{ .Values.coordinatord.replicas }}
  selector:
    matchLabels:
      {{- include "loadify.selectorLabels" (dict "ctx" . "component" "coordinatord") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "loadify.selectorLabels" (dict "ctx" . "component" "coordinatord") | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations: {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "loadify.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: coordinatord
          image: {{ include "loadify.image" (dict "ctx" . "component" "coordinatord") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - { name: grpc, containerPort: {{ .Values.coordinatord.grpcPort }} }
            - { name: http, containerPort: {{ .Values.coordinatord.httpPort }} }
          env:
            - { name: LOADIFY_COORDINATOR_GRPC_ADDR, value: ":{{ .Values.coordinatord.grpcPort }}" }
            - { name: LOADIFY_COORDINATOR_HTTP_ADDR, value: ":{{ .Values.coordinatord.httpPort }}" }
            - { name: LOADIFY_CLICKHOUSE_ADDR, value: {{ .Values.database.clickhouse.addr | quote }} }
            - { name: LOADIFY_CLICKHOUSE_DB, value: {{ .Values.database.clickhouse.database | quote }} }
            - { name: LOADIFY_CLICKHOUSE_USER, value: {{ .Values.database.clickhouse.username | quote }} }
            - { name: LOADIFY_CLICKHOUSE_PASSWORD, value: {{ .Values.database.clickhouse.password | quote }} }
            - name: LOADIFY_POSTGRES_DSN
              valueFrom:
                secretKeyRef: { name: {{ include "loadify.secretName" . }}, key: LOADIFY_POSTGRES_DSN }
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources: {{- toYaml .Values.coordinatord.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "loadify.fullname" . }}-coordinatord
  labels:
    {{- include "loadify.labels" . | nindent 4 }}
    app.kubernetes.io/component: coordinatord
spec:
  # Headless so workers resolve the coordinator's gRPC endpoint directly.
  clusterIP: None
  selector:
    {{- include "loadify.selectorLabels" (dict "ctx" . "component" "coordinatord") | nindent 4 }}
  ports:
    - { name: grpc, port: {{ .Values.coordinatord.grpcPort }}, targetPort: grpc }
    - { name: http, port: {{ .Values.coordinatord.httpPort }}, targetPort: http }
