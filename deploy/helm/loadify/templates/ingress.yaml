{{- if .Values.ingress.enabled -}}
{{- $full := include "loadify.fullname" . -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $full }}
  labels:
    {{- include "loadify.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls: {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ $full }}-apisrv
                port: { number: {{ .Values.apisrv.port }} }
          - path: /healthz
            pathType: Prefix
            backend:
              service:
                name: {{ $full }}-apisrv
                port: { number: {{ .Values.apisrv.port }} }
          {{- if .Values.web.enabled }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $full }}-web
                port: { number: {{ .Values.web.port }} }
          {{- end }}
{{- end }}
