<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 470" font-family="ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,'PingFang SC',sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#5b6b86"/>
    </marker>
    <style>
      .card{fill:#121a2b;stroke:#26334a;stroke-width:1.5;rx:12}
      .acc{fill:#0e1f28;stroke:#36d6e7;stroke-width:1.8}
      .t{fill:#e9eff8;font-size:15px;font-weight:600}
      .s{fill:#8b99b3;font-size:11.5px}
      .lbl{fill:#6f7d96;font-size:11px}
      .ln{stroke:#5b6b86;stroke-width:1.6;fill:none;marker-end:url(#arr)}
    </style>
  </defs>

  <rect x="0" y="0" width="980" height="470" rx="16" fill="#070b12"/>
  <text x="28" y="38" fill="#36d6e7" font-size="18" font-weight="700">loadify</text>
  <text x="104" y="38" class="s">distributed load testing — one control plane, workers on any number of servers</text>

  <!-- Clients -->
  <text x="28" y="78" class="lbl">CLIENTS</text>
  <g>
    <rect class="card" x="24" y="88" width="168" height="52" rx="12"/>
    <text x="40" y="112" class="t">Web UI</text><text x="40" y="130" class="s">live charts · builder</text>
    <rect class="card" x="24" y="156" width="168" height="52" rx="12"/>
    <text x="40" y="180" class="t">CLI · loadifyctl</text><text x="40" y="198" class="s">terminal / CI</text>
    <rect class="card" x="24" y="224" width="168" height="52" rx="12"/>
    <text x="40" y="248" class="t">AI Agent</text><text x="40" y="266" class="s">MCP · OpenAPI · token</text>
  </g>

  <!-- apisrv -->
  <rect class="card" x="272" y="120" width="158" height="124" rx="12"/>
  <text x="290" y="150" class="t">apisrv</text>
  <text x="290" y="172" class="s">REST · WebSocket</text>
  <text x="290" y="190" class="s">auth · RBAC · share</text>
  <text x="290" y="208" class="s">SLA gates · webhooks</text>

  <!-- data stores -->
  <text x="276" y="300" class="lbl">STATE</text>
  <rect class="card" x="272" y="310" width="158" height="46" rx="10"/>
  <text x="290" y="338" class="t">PostgreSQL</text>
  <rect class="card" x="272" y="366" width="158" height="46" rx="10"/>
  <text x="290" y="394" class="t">ClickHouse</text>
  <text x="290" y="410" class="lbl" font-size="0"></text>

  <!-- coordinator -->
  <rect class="acc" x="510" y="120" width="158" height="124" rx="12"/>
  <text x="528" y="150" class="t">coordinatord</text>
  <text x="528" y="172" class="s">VU sharding</text>
  <text x="528" y="190" class="s">admission + queue</text>
  <text x="528" y="208" class="s">metric merge</text>
  <text x="528" y="232" class="lbl">single control plane</text>

  <!-- workers -->
  <text x="752" y="78" class="lbl">WORKERS · any servers</text>
  <rect class="card" x="748" y="88" width="200" height="44" rx="10"/>
  <text x="764" y="115" class="t">workerd · region A</text>
  <rect class="card" x="748" y="140" width="200" height="44" rx="10"/>
  <text x="764" y="167" class="t">workerd · region B</text>
  <rect class="card" x="748" y="192" width="200" height="44" rx="10"/>
  <text x="764" y="219" class="t">workerd · …×N</text>

  <!-- target -->
  <rect class="card" x="748" y="318" width="200" height="56" rx="12"/>
  <text x="764" y="344" class="t">Target system (SUT)</text>
  <text x="764" y="362" class="s">HTTP · gRPC · WS · SSE</text>

  <!-- arrows: clients -> apisrv -->
  <path class="ln" d="M192 114 L268 168"/>
  <path class="ln" d="M192 182 L268 182"/>
  <path class="ln" d="M192 250 L268 198"/>
  <!-- apisrv <-> stores -->
  <path class="ln" d="M351 244 L351 308"/>
  <path class="ln" d="M392 244 L392 364"/>
  <!-- apisrv -> coordinator -->
  <path class="ln" d="M430 182 L506 182"/>
  <!-- coordinator -> workers (gRPC) -->
  <path class="ln" d="M668 168 L744 110"/>
  <path class="ln" d="M668 182 L744 162"/>
  <path class="ln" d="M668 196 L744 214"/>
  <text x="676" y="150" class="lbl">gRPC</text>
  <!-- coordinator -> clickhouse (rollups) -->
  <path class="ln" d="M510 220 C 460 300, 440 330, 432 360"/>
  <!-- workers -> target -->
  <path class="ln" d="M848 236 L848 314"/>
  <text x="858" y="284" class="lbl">load</text>

  <text x="28" y="452" class="s">Workers dial OUT to the coordinator (gRPC) — add capacity by starting more workerd on more machines. Postgres + ClickHouse are external.</text>
</svg>
