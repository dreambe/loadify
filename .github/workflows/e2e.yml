name: e2e

# Brings up the full stack with docker compose and runs the Playwright smoke
# suite — the "produce here, consume there" flows (copy an ID/token, use it
# elsewhere) that unit tests and tsc can't catch.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build and start the stack
        working-directory: deploy/compose
        run: docker compose up -d --build

      - name: Wait for apisrv + web
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/healthz >/dev/null 2>&1 \
               && curl -fsS http://localhost:3000 >/dev/null 2>&1; then
              echo "stack is up"; exit 0
            fi
            sleep 5
          done
          echo "stack did not become ready"; exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web deps + browser
        working-directory: web
        run: |
          npm ci
          npm run e2e:install

      - name: Run smoke E2E
        working-directory: web
        env:
          E2E_BASE_URL: http://localhost:3000
          E2E_API_URL: http://localhost:8080
          E2E_ADMIN_EMAIL: admin@loadify.local
          E2E_ADMIN_PASSWORD: admin12345
          E2E_TARGET_URL: http://echo-target:8088/
        run: npm run e2e

      - name: Dump stack logs on failure
        if: failure()
        working-directory: deploy/compose
        run: docker compose logs --no-color --tail 200

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report
          if-no-files-found: ignore
