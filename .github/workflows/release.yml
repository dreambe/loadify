name: release

# Build and publish container images to GHCR (GitHub Container Registry) on a
# version tag (e.g. `git tag v0.1.0 && git push --tags`) or manual dispatch.
# Images land at ghcr.io/<owner>/loadify-<component>:<tag> + :latest, multi-arch
# (amd64 + arm64). No extra secrets — GITHUB_TOKEN is used to push.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: apisrv
            dockerfile: deploy/docker/Dockerfile
          - component: coordinatord
            dockerfile: deploy/docker/Dockerfile
          - component: workerd
            dockerfile: deploy/docker/Dockerfile
          - component: web
            dockerfile: deploy/docker/Dockerfile.web
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/loadify-${{ matrix.component }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          # SERVICE is read by the shared Go Dockerfile; the web Dockerfile reads
          # NEXT_PUBLIC_API_BASE. Each Dockerfile ignores the other arg.
          build-args: |
            SERVICE=${{ matrix.component }}
            NEXT_PUBLIC_API_BASE=${{ vars.LOADIFY_API_BASE || 'http://localhost:8080' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
